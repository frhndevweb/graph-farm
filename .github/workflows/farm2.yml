name: Graph Farm 2

on:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  farm2:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update log
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "[$DATE] farm2 commit executed" >> farm.log

      - name: Commit
        run: |
          git config user.name "frhndevweb"
          git config user.email "frhndevweb@gmail.com"

          git add farm.log
          git commit -m "🌱 farm2: $DATE" || echo "No changes"

          git push
