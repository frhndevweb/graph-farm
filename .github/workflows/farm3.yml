name: Graph Farm 3

on:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  farm3:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "[$DATE] farm3 commit executed" >> farm.log

      - run: |
          git config user.name "frhndevweb"
          git config user.email "frhndevweb@gmail.com"

          git add farm.log
          git commit -m "🌱 farm3: $DATE" || echo "No changes"

          git pull --rebase
          git push
